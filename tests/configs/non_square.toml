[metadata]
experiment_name = "test001"
description = "Test config."

[engine]
num_photons = 5_000
batch_size = 1_000
random_seed = 42
num_threads = 1

[domain]
size_x_km = 100
size_y_km = 20
boundary_condition = "periodic"

[detectors.energy_budget]

[detectors.trajectories]

[detectors.flux_profile]
vertical_resolution_km = 10.0

[detectors.absorption_profile]
vertical_resolution_km = 10.0

[detectors.flux_maps]
horizontal_resolution_km = 0.9
z_levels_km = [0, 2, 3, 6, 7]

[detectors.surface_absorption_map]
horizontal_resolution_km = 0.9

[output]
overwrite = true
base_dir = "results"
fig_dir = "plots"

[surface_materials.snow]
albedo = 0.85
brdf = { type = "lambertian" }

[atmosphere_materials.air]
extinction_coeff_per_km = 0.01
ssa = 0.9
phase_function = { type = "rayleigh" }

[[layer]]
thickness_km = 10.0
components = { air = 1.0 }

[surface]
type = "uniform"
material = "snow"