[metadata]
experiment_name = "demo001"
description = "A demo simulation."

[engine]
random_seed = 42
num_photons = 1_000
batch_size = 100
num_threads = 4
resume_from_checkpoint = false

[source]
zenith_angle_deg = 90
azimuth_angle_deg = 360
wavelength_nm = 530

[domain]
size_x_km = 100
size_y_km = 100
boundary_condition = "periodic"

[detectors.energy_budget]

[detectors.trajectories]
max_tracked_paths = 10

[detectors.flux_profile]
vertical_resolution_km = 20.0

[detectors.absorption_profile]
vertical_resolution_km = 20.0

[detectors.flux_maps]
horizontal_resolution_km = 1.0
z_levels_km = [0, 4.0]

[detectors.surface_absorption_map]
horizontal_resolution_km = 1.0

[output]
save_plots = false
overwrite = true
base_dir = "results"
fig_dir = "plots"

[surface_materials.snow]
albedo = 0.85
brdf = { type = "lambertian" }

[surface_materials.ocean]
albedo = 0.01
brdf = { type = "specular", roughness = 0.0 }

[atmosphere_materials.air]
extinction_coeff_per_km = 0.01
ssa = 0.9
phase_function = { type = "rayleigh" }

[atmosphere_materials.light_clouds]
extinction_coeff_per_km = 1.0
ssa = 0.999999
phase_function = { type = "hg", g = 0.85 }

[atmosphere_materials.dark_clouds]
extinction_coeff_per_km = 5.0
ssa = 0.999999
phase_function = { type = "hg", g = 0.85 }

[[layer]]
thickness_km = 2.0
components = { air = 1.0 }

[[layer]]
thickness_km = 4.0
components = { air = 0.1, dark_clouds = 0.9 }

[[layer]]
thickness_km = 4.0
components = { air = 1.0 }

[surface]
type = "circle"
radius_km = 20.0
material_in = "snow"
material_out = "ocean"

[[scenario]]
name = "test-scenario-1"
source.zenith_angle_deg = 35

[[scenario]]
name = "test-scenario-2"
source.zenith_angle_deg = 55

[[sweep]]
parameter = "source.azimuth_angle_deg"
values    = [0, 45, 90]