[metadata]
experiment_name = "test001"
description = "Test config."

[engine]
num_photons = 2_000
batch_size = 400
random_seed = 42
cpu_cores = 1

[source]
theta_sun_deg = 30
phi_sun_deg = 0
wavelength_nm = 530

[geometry]
domain_size_x_km = 100
domain_size_y_km = 100
boundary_condition = "periodic"

[detectors]
active = [
    "fate", 
    "path_tracking", 
    "vertical_flux", 
    "absorption_vertical", 
    "plane_flux", 
    "surface_absorption"
]
vertical_profiles_resolution_km = 11.3
horizontal_maps_resolution_km = 5.0

[output]
overwrite = true

[surface_materials.snow]
albedo = 0.85
reflection = { type = "lambertian" }

[atmosphere_materials.air]
extinction_coeff_per_km = 0.01
ssa = 0.9
scattering = { type = "rayleigh" }

[[layer]]
thickness_km = 10.0
components = [{ material = "air", concentration = 1.0 }]

[surface]
name = "uniform"
material = "snow"