[metadata]
experiment_name = "test001"
description = "Test config."

[engine]
num_photons = 2_000
batch_size = 400
random_seed = 42
num_threads = 1

[source]
zenith_angle_deg = 30
azimuth_angle_deg = 0
wavelength_nm = 530

[domain]
size_x_km = 100
size_y_km = 100
boundary_condition = "periodic"

[detectors.energy_budget]

[detectors.trajectories]

[detectors.flux_profile]
vertical_resolution_km = 11.3

[detectors.absorption_profile]
vertical_resolution_km = 11.3

[detectors.flux_maps]
horizontal_resolution_km = 5.0

[detectors.surface_absorption_map]
horizontal_resolution_km = 5.0

[output]
overwrite = true
base_dir = "results"
fig_dir = "plots"

[surface_materials.snow]
albedo = 0.85
brdf = { type = "lambertian" }

[atmosphere_materials.air]
extinction_coeff_per_km = 0.01
ssa = 0.9
phase_function = { type = "rayleigh" }

[[layer]]
thickness_km = 10.0
components = { air = 1.0 }

[surface]
type = "uniform"
material = "snow"