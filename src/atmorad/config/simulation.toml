[metadata]
experiment_name = "demo001"
description = "A demo simulation."

[engine]
num_photons = 100_000
batch_size = 100_000
random_seed = 42
cpu_cores = 4
resume_from_checkpoint = false # set to true if simulation got interrupted and you want to resume
# russian roullette parameters
photon_weight_threshold = 1e-4
photon_survival_chance = 0.1

[source]
theta_sun_deg = 30
phi_sun_deg = 0 
wavelength_nm = 530

[geometry]
domain_size_x_km = 100
domain_size_y_km = 100
boundary_condition = "periodic"

[detectors]
active = [
    "fate", 
    "path_tracking", 
    "vertical_flux", 
    "absorption_vertical", 
    "plane_flux", 
    "surface_absorption"
]

# Configuration for the active detectors above
vertical_profiles_resolution_km = 0.5
horizontal_maps_resolution_km = 1.0
num_full_paths = 100
flux_maps_z_levels_km = [0.0, 4.0, 10.0]

[output]
save_plots = true
overwrite = true
path = 'results'

[surface_materials]
[surface_materials.snow]
albedo = 0.85
reflection = {type = "lambertian"}
[surface_materials.ocean]
albedo = 0.01
reflection = {type = "specular", roughness = 0.0}


[atmosphere_materials]
[atmosphere_materials.air]
extinction_coeff_per_km = 0.01
ssa = 0.9
scattering = {type = "rayleigh"} # rayleigh, hg, isotropic
[atmosphere_materials.light_clouds]
extinction_coeff_per_km = 1
ssa = 0.999999
scattering = {type = "hg", assymetry_factor = 0.85}
[atmosphere_materials.dark_clouds]
extinction_coeff_per_km = 5
ssa = 0.999999
scattering = {type = "hg", assymetry_factor = 0.85}

# Define atmospheric structure from bottom to top
[[layer]]
thickness_km = 2
materials = [{type = "air", weight = 1.0}]

[[layer]]
thickness_km = 4
materials = [
    {type = "air", weight = 0.1},
    {type = "dark_clouds", weight = 0.9}
]

[[layer]]
thickness_km = 4
materials = [{type = "air", weight = 1.0}]

# ___ Surface Map Configuration ___
