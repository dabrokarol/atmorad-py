[metadata]
experiment_name = "adjacency001"
description = "Demo showcasing adjacency effect"

[engine]
num_photons = 1_000_000
batch_size = 100_000
cpu_cores = 4
resume_from_checkpoint = true

[source]
theta_sun_deg = 30

[geometry]
domain_size_x_km = 100
domain_size_y_km = 100

[detectors]
num_full_paths = 0
incident_flux_heights_km = [0, 4.0]

[output]
save_incident_flux_maps = true
overwrite = true
save_plots = true

[surface_materials.snow]
albedo = 0.85
reflection = {type = "lambertian"}
[surface_materials.ocean]
albedo = 0.01
reflection = {type = "mirror", roughness = 0.0}

[atmosphere_materials.material-1]
extinction_coeff_per_km = 10
ssa = 0.999999
scattering = {type = "hg", g=0.85}


[[layer]]
thickness_km = 4
materials = [
    {type = "material-1", weight = 1.0}
]

[surface]
name = "split-half-x"
material_left = "snow"
material_right = "ocean"
