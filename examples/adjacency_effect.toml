[metadata]
experiment_name = "adjacency001"
description = "Demo showcasing adjacency effect"

[engine]
num_photons = 10_000_000
batch_size = 200_000
cpu_cores = 4
resume_from_checkpoint = false

[source]
theta_sun_deg = 0

[geometry]
domain_size_x_km = 10
domain_size_y_km = 10

[detectors]
active = [
    "fate", 
    "path_tracking", 
    "vertical_flux", 
    "absorption_vertical", 
    "plane_flux", 
    "surface_absorption"
]
horizontal_maps_resolution_km = 0.1
flux_maps_z_levels_km = [0, 1.0, 2.0, 3.0]

[output]
overwrite = false
save_plots = true

[surface_materials.snow]
albedo = 0.85
reflection = {type = "lambertian"}
[surface_materials.ocean]
albedo = 0.01
reflection = {type = "specular", roughness = 0.0}

[atmosphere_materials.material_1]
extinction_coeff_per_km = 10
ssa = 0.999999
scattering = {type = "hg", g = 0.85}


[[layer]]
thickness_km = 10
components = [
    {material = "material_1", concentration = 1.0}
]

[surface]
name = "split_half_x"
material_left = "snow"
material_right = "ocean"


[[scenario]]
name="tau-1"
atmosphere_materials.material_1.extinction_coeff_per_km = 0.1

[[scenario]]
name="tau-2.5"
atmosphere_materials.material_1.extinction_coeff_per_km = 0.25

[[scenario]]
name="tau-5"
atmosphere_materials.material_1.extinction_coeff_per_km = 0.5

[[scenario]]
name="tau-10"
atmosphere_materials.material_1.extinction_coeff_per_km = 1

[[scenario]]
name="tau-25"
atmosphere_materials.material_1.extinction_coeff_per_km = 2.5

[[scenario]]
name="tau-50"
atmosphere_materials.material_1.extinction_coeff_per_km = 5
