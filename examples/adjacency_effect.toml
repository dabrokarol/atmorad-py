[metadata]
experiment_name = "adjacency001"
description = "Demo showcasing adjacency effect"

[engine]
num_photons = 1_000_000
batch_size = 100_000
random_seed = 42
cpu_cores = 4

[source]
theta_sun_deg = 30
phi_sun_deg = 0
wavelength_nm = 530

[geometry]
domain_size_x_km = 10
domain_size_y_km = 10
boundary_condition = "periodic"

[detectors]
vertical_flux_resolution_km = 1.0
map2d_resolution_km = 0.2
num_full_paths = 0

[output]
save_flux_maps = true
save_vertical_profile = false
save_photon_paths = false 
save_heating_rates = false
overwrite = true
path = 'results'

[surface_materials]
    [surface_materials.snow]
    albedo = 0.85
    reflection = {type = "lambertian"}
    [surface_materials.ocean]
    albedo = 0.01
    reflection = {type = "mirror", roughness = 0.0}


[atmosphere_materials]
    [atmosphere_materials.air]
    extinction_coeff_per_km = 0.01
    ssa = 0.9
    scattering = {type = "rayleigh"}
    [atmosphere_materials.light-clouds]
    extinction_coeff_per_km = 1
    ssa = 0.999999
    scattering = {type = "hg", g = 0.85}
    [atmosphere_materials.dark-clouds]
    extinction_coeff_per_km = 5
    ssa = 0.999999
    scattering = {type = "hg", g = 0.85}

[[layer]]
z_range_km = [0, 4]
materials = [
    {type = "dark-clouds", weight = 1.0}
]

[surface]
name = "split-half-x"
material_left = "snow"
material_right = "ocean"

